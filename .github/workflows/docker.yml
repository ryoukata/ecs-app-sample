name: Docker Build

on:
  workflow_run:
    workflows:
      - Go Test
    types:
      - completed

permissions:
  contents: read
  packages: write

jobs:
  docker:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (non-main branches)
        if: ${{ github.event.workflow_run.head_branch != 'main' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ghcr.io/${{ github.repository }}:sha-${{ github.event.workflow_run.head_sha }}

      - name: Log in to GHCR
        if: ${{ github.event.workflow_run.head_branch == 'main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (main branch)
        if: ${{ github.event.workflow_run.head_branch == 'main' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:sha-${{ github.event.workflow_run.head_sha }}
